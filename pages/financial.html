<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <!--taiwind-->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<section class="relative h-[400px] flex items-center bg-cover bg-center"
  style="background-image: url('https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=1200&auto=format&fit=crop&q=80');">

  <!-- Overlay -->
  <div class="absolute inset-0 bg-black/60"></div>

  <div class="container mx-auto relative z-10 px-6 lg:px-20 text-center lg:text-left">
    
    <!-- Title -->
    <h1 class="text-white text-4xl sm:text-5xl font-extrabold mb-4" data-aos="fade-up">
      Financial Consulting
    </h1>

    <!-- Description -->
    <p class="text-gray-200 text-lg sm:text-xl max-w-3xl leading-relaxed mb-6" data-aos="fade-up" data-aos-delay="100">
      We provide expert financial consulting services designed to help businesses make  
      smarter decisions, optimize performance, and achieve long-term stability.  
      Our financial strategies empower companies to grow with confidence.
    </p>

    <!-- Breadcrumb -->
    <div class="flex justify-center lg:justify-start items-center gap-2 text-white text-sm" data-aos="fade-up" data-aos-delay="200">
      <i class="fa-solid fa-house"></i>
      <a href="#" class="hover:text-blue-400 transition">Home</a>
      <span class="text-gray-300">/</span>
      <span class="text-blue-400 font-semibold">Financial Consulting</span>
    </div>

  </div>
</section>



</body>
</html>
